<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura 360</title>
    <!-- Cargamos A-Frame para el entorno 360 interactivo -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Pantallas principales */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Pantalla de Inicio */
        #screen-start {
            background: linear-gradient(135deg, #1e1e2f, #0f0c20);
            color: white;
            text-align: center;
        }

        #screen-start h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            animation: fadeInDown 1s ease;
        }

        /* Interfaz de usuario flotante (sobre el 360) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none; /* Deja pasar los clicks al 360 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        /* Botones generales */
        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #ff4757;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            pointer-events: auto; /* Reactiva los clicks en los botones */
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
            background: #ff6b81;
        }

        .btn-nav {
            align-self: center;
            margin-bottom: 2rem;
            background: #2ed573;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }
        .btn-nav:hover {
            background: #5edfff;
            box-shadow: 0 6px 20px rgba(94, 223, 255, 0.6);
            color: #000;
        }

        .btn-home {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: none;
        }
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Animación del Túnel / Agujero */
        #tunnel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: radial-gradient(circle, transparent 100%, #000 100%);
            pointer-events: none;
            opacity: 0;
        }

        .animate-tunnel {
            animation: tunnelEffect 1.8s forwards ease-in-out;
        }

        /* Pantalla Final */
        #screen-end {
            background: #000;
            color: #fff;
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* Keyframes */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes tunnelEffect {
            0% {
                opacity: 1;
                background: radial-gradient(circle, transparent 100%, #000 100%);
            }
            50% {
                background: radial-gradient(circle, transparent 30%, #0f0c20 70%, #000 100%);
            }
            100% {
                opacity: 1;
                background: radial-gradient(circle, transparent 0%, #000 0%);
            }
        }
    </style>
</head>
<body>

    <!-- Elemento de Audio Oculto -->
    <audio id="mu-audio" src="MU.mp3" loop></audio>

    <!-- 1. PANTALLA DE INICIO -->
    <div id="screen-start" class="screen">
        <h1>Que esta aventura comience</h1>
        <button class="btn" onclick="startAdventure()">Comenzar</button>
    </div>

    <!-- 2. ENTORNO INTERACTIVO 360 (A-Frame) -->
    <div id="screen-360" class="screen hidden" style="z-index: 1;">
        <!-- Escena 360 -->
        <a-scene embedded vr-mode-ui="enabled: false" loading-screen="enabled: false">
            <!-- Imagen 360 cargada dinámicamente -->
            <a-sky src="IMA_1.png" rotation="0 -90 0"></a-sky>
            
            <!-- Cámara con controles de mouse/touch y zoom con scroll integrado -->
            <a-entity camera look-controls="reverseMouseDrag: true"></a-entity>
        </a-scene>

        <!-- Capa de UI flotante -->
        <div id="ui-layer">
            <!-- Botón Volver al inicio (Siempre disponible) -->
            <button class="btn btn-home" onclick="resetToStart()">Volver al inicio</button>
            <div></div> <!-- Espaciador -->
            <!-- Botón Sigamos -->
            <button class="btn btn-nav" onclick="triggerTunnel()">Sigamos</button>
        </div>
    </div>

    <!-- EFECTO EFÍMERO DE TÚNEL -->
    <div id="tunnel-overlay"></div>

    <!-- 3. PANTALLA FINAL -->
    <div id="screen-end" class="screen hidden">
        <div>Fin</div>
        <!-- Botón Volver al inicio (También aquí disponible) -->
        <button class="btn btn-home" onclick="resetToStart()">Volver al inicio</button>
    </div>

    <!-- LÓGICA DE CONTROL -->
    <script>
        const audio = document.getElementById('mu-audio');
        const screenStart = document.getElementById('screen-start');
        const screen360 = document.getElementById('screen-360');
        const screenEnd = document.getElementById('screen-end');
        const tunnelOverlay = document.getElementById('tunnel-overlay');

        // Función para iniciar la aventura y reproducir música
        function startAdventure() {
            screenStart.classList.add('hidden');
            screen360.classList.remove('hidden');
            
            // Intenta reproducir la música (requiere interacción previa del usuario)
            audio.currentTime = 0;
            audio.play().catch(error => {
                console.log("El navegador bloqueó el autoplay temporalmente:", error);
            });
        }

        // Función para activar la animación de entrada al túnel e ir al final
        function triggerTunnel() {
            tunnelOverlay.classList.add('animate-tunnel');
            
            // Espera a que la animación del túnel cubra la pantalla para hacer el cambio
            setTimeout(() => {
                screen360.classList.add('hidden');
                screenEnd.classList.remove('hidden');
                tunnelOverlay.classList.remove('animate-tunnel');
            }, 1500); // Duración sincronizada con el CSS
        }

        // Función global para reiniciar la experiencia en cualquier momento
        function resetToStart() {
            // Detener y resetear audio
            audio.pause();
            audio.currentTime = 0;

            // Resetear visibilidad de pantallas
            screenEnd.classList.add('hidden');
            screen360.classList.add('hidden');
            tunnelOverlay.className = ''; // Limpia clases de animación
            screenStart.classList.remove('hidden');
            
            // Opcional: Resetear la rotación de la cámara de A-Frame al volver
            const camera = document.querySelector('[camera]');
            if(camera) {
                camera.setAttribute('rotation', '0 0 0');
            }
        }
    </script>
</body>
</html>
