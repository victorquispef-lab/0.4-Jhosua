<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Interactiva 360</title>
    <!-- Librería A-Frame para el renderizado 360° -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Contenedores de pantallas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* PANTALLA 1: INICIO */
        #screen-start {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0c20 100%);
            color: #fff;
            text-align: center;
        }

        #screen-start h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }

        /* PANTALLA 2: VISOR 360 */
        #screen-360 {
            z-index: 1;
        }

        /* Efecto de Zoom Out/In de la escena entera durante la transición */
        .tunnel-active-scene {
            transform: scale(4) rotate(45deg);
            filter: blur(5px);
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        /* CAPA DE INTERFAZ SOBRE EL 360 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none; /* Permite arrastrar el 360 de fondo */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        /* BOTONES */
        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 20px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.6);
        }

        .btn-sigamos {
            align-self: center;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .btn-sigamos:hover {
            box-shadow: 0 8px 25px rgba(56, 239, 125, 0.6);
        }

        /* Botón Volver al inicio (Siempre flotando arriba, con z-index alto para superar al iframe) */
        .btn-home {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            padding: 10px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: #fff;
            z-index: 9999; /* Máxima prioridad para que siempre sea cliqueable */
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        /* ANIMACIÓN EFECTO TÚNEL/VÓRTICE */
        #tunnel-vortex {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            background: radial-gradient(circle, transparent 100%, #000 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .show-vortex {
            opacity: 1 !important;
            animation: vortexPulse 1.5s infinite linear;
        }

        @keyframes vortexPulse {
            0% {
                background: radial-gradient(circle, transparent 100%, #000 100%);
            }
            50% {
                background: radial-gradient(circle, rgba(17, 153, 142, 0.3) 30%, #000000 70%);
            }
            100% {
                background: radial-gradient(circle, transparent 0%, #000000 0%);
            }
        }

        /* PANTALLA 3: CONTENEDOR DEL IFRAME PARA EL HTML "FIN" */
        #screen-end {
            background: #000000;
            z-index: 20;
            width: 100%;
            height: 100%;
        }

        #iframe-fin {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- Elemento de Audio Oculto -->
    <audio id="mu-audio" src="MU.mp3" loop></audio>

    <!-- Botón global "Volver al inicio" (Siempre por encima de todo) -->
    <button id="global-home-btn" class="btn btn-home hidden" onclick="resetToStart()">Volver al inicio</button>

    <!-- 1. PANTALLA DE INICIO -->
    <div id="screen-start" class="screen">
        <h1>Que esta aventura comience</h1>
        <button class="btn" onclick="startAdventure()">Comenzar</button>
    </div>

    <!-- 2. VISOR 360 (A-FRAME) -->
    <div id="screen-360" class="screen hidden">
        <a-scene embedded vr-mode-ui="enabled: false" loading-screen="enabled: false">
            <a-sky src="IMA_1.png" rotation="0 -90 0"></a-sky>
            
            <!-- Cámara con controles de rotación y script de Zoom integrado -->
            <a-entity camera look-controls="reverseMouseDrag: true" zoom-controls></a-entity>
        </a-scene>

        <!-- Capa del botón "Sigamos" -->
        <div id="ui-layer">
            <div></div> <!-- Relleno superior -->
            <button class="btn btn-sigamos" onclick="triggerTunnel()">Sigamos</button>
        </div>
    </div>

    <!-- Efecto visual del túnel espacial -->
    <div id="tunnel-vortex"></div>

    <!-- 3. PANTALLA QUE CARGA TU ARCHIVO HTML EXTERNO "FIN" -->
    <div id="screen-end" class="screen hidden">
        <!-- Cargamos el HTML externo usando un Iframe para que se ejecute de forma aislada y limpia -->
        <iframe id="iframe-fin" src=""></iframe>
    </div>

    <!-- SCRIPTS DE CONTROL -->
    <script>
        // Componente de A-Frame para habilitar Zoom táctil y scroll de ratón
        AFRAME.registerComponent('zoom-controls', {
            init: function () {
                const camera = this.el;
                let fov = 80;
                
                window.addEventListener('wheel', (e) => {
                    if (document.getElementById('screen-360').classList.contains('hidden')) return;
                    fov += e.deltaY * 0.05;
                    fov = Math.max(30, Math.min(100, fov));
                    camera.setAttribute('camera', 'fov', fov);
                });

                let touchStartDist = 0;
                window.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        touchStartDist = Math.hypot(
                            e.touches[0].pageX - e.touches[1].pageX,
                            e.touches[0].pageY - e.touches[1].pageY
                        );
                    }
                });

                window.addEventListener('touchmove', (e) => {
                    if (document.getElementById('screen-360').classList.contains('hidden')) return;
                    if (e.touches.length === 2 && touchStartDist) {
                        const dist = Math.hypot(
                            e.touches[0].pageX - e.touches[1].pageX,
                            e.touches[0].pageY - e.touches[1].pageY
                        );
                        const factor = (touchStartDist - dist) * 0.1;
                        fov += factor;
                        fov = Math.max(30, Math.min(100, fov));
                        camera.setAttribute('camera', 'fov', fov);
                        touchStartDist = dist;
                    }
                });
            }
        });

        // Selectores de Elementos
        const audio = document.getElementById('mu-audio');
        const screenStart = document.getElementById('screen-start');
        const screen360 = document.getElementById('screen-360');
        const screenEnd = document.getElementById('screen-end');
        const tunnelVortex = document.getElementById('tunnel-vortex');
        const globalHomeBtn = document.getElementById('global-home-btn');
        const iframeFin = document.getElementById('iframe-fin');

        // 1. Iniciar aventura (reproduce música)
        function startAdventure() {
            screenStart.classList.add('hidden');
            screen360.classList.remove('hidden');
            globalHomeBtn.classList.remove('hidden'); // Activar botón de regreso
            
            audio.currentTime = 0;
            audio.play().catch(err => console.log("Permisos de reproducción requeridos:", err));
        }

        // 2. Transición Túnel y carga del archivo HTML externo
        function triggerTunnel() {
            tunnelVortex.classList.add('show-vortex');
            screen360.classList.add('tunnel-active-scene');

            // Después de la animación de 1.5s, cargamos el HTML externo y ocultamos el 360
            setTimeout(() => {
                screen360.classList.add('hidden');
                screen360.classList.remove('tunnel-active-scene');
                tunnelVortex.classList.remove('show-vortex');
                
                // IMPORTANTE: Aquí se lee tu archivo. 
                // Si tu archivo se llama exactamente "Fin" (sin extensión .html), déjalo como 'Fin'.
                // Si se llama "Fin.html", cámbialo a 'Fin.html' en la línea de abajo.
                iframeFin.src = 'Fin.html'; 
                
                screenEnd.classList.remove('hidden');
            }, 1500);
        }

        // 3. Volver al Inicio (Siempre disponible)
        function resetToStart() {
            // Pausar audio
            audio.pause();
            audio.currentTime = 0;

            // Limpiar la fuente del iframe para que deje de ejecutarse en segundo plano
            iframeFin.src = '';

            // Resetear visibilidad
            screenEnd.classList.add('hidden');
            screen360.classList.add('hidden');
            globalHomeBtn.classList.add('hidden');
            screenStart.classList.remove('hidden');

            // Resetear cámara de A-Frame
            const cameraEl = document.querySelector('[camera]');
            if (cameraEl) {
                cameraEl.setAttribute('camera', 'fov', 80);
                cameraEl.setAttribute('rotation', '0 0 0');
            }
        }
    </script>
</body>
</html>
